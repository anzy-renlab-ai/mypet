name: Release

# Trigger: push a `v*` tag (e.g. v0.2.0). Builds the macOS .app, zips it,
# and attaches the zip to the matching GitHub Release.

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build macOS .app + attach to release
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: write   # so softprops/action-gh-release can upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Show Swift version
        run: swift --version

      - name: Run tests (must pass before shipping)
        # Same skip as ci.yml — ClaudeSubprocessTests needs the real CLI.
        run: swift test --skip ClaudeSubprocessTests

      - name: Build release binary
        run: swift build -c release

      - name: Assemble .app bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          ROOT=dist/mypet.app
          mkdir -p "$ROOT/Contents/MacOS" "$ROOT/Contents/Resources"
          cp .build/release/mypet "$ROOT/Contents/MacOS/"
          cp -R .build/release/MyPet_MyPet.bundle "$ROOT/Contents/Resources/"
          sips -z 512 512 Sources/MyPet/Resources/sprites/cookie.png \
            --out "$ROOT/Contents/Resources/AppIcon.png" >/dev/null

          cat > "$ROOT/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key><string>ai.renlab.mypet</string>
            <key>CFBundleName</key><string>mypet</string>
            <key>CFBundleDisplayName</key><string>mypet</string>
            <key>CFBundleExecutable</key><string>mypet</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSUIElement</key><true/>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>NSHumanReadableCopyright</key><string>© 2026 alvin (anzy-renlab-ai). Code MIT; artwork All Rights Reserved.</string>
          </dict>
          </plist>
          PLIST

          # Ad-hoc sign — no Developer ID needed, lets Gatekeeper show
          # "Open Anyway" on first launch (vs flat-out blocking).
          codesign --force --deep --sign - "$ROOT"
          codesign -dv "$ROOT" 2>&1 | head -3

      - name: Zip the bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd dist
          zip -qr "mypet-${VERSION}-macos.zip" mypet.app
          shasum -a 256 "mypet-${VERSION}-macos.zip" > "mypet-${VERSION}-macos.zip.sha256"
          ls -la

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mypet-${{ steps.version.outputs.version }}-macos.zip
            dist/mypet-${{ steps.version.outputs.version }}-macos.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
          draft: false
          prerelease: false

      - name: Bump Homebrew tap (version + sha256)
        # Needs a fine-grained PAT scoped to anzy-renlab-ai/homebrew-tap
        # with `contents: read+write` set in the repo's Settings →
        # Secrets and variables → Actions as HOMEBREW_TAP_TOKEN.
        # Skips silently if the secret isn't set (lets the release ship
        # even when the tap-bump credential is rotated).
        if: env.TAP_TOKEN != ''
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          SHA=$(shasum -a 256 "dist/mypet-${VERSION}-macos.zip" | awk '{print $1}')
          echo "version=${VERSION} sha=${SHA}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/anzy-renlab-ai/homebrew-tap.git" tap
          cd tap

          # Patch version + sha256 in the cask file.
          sed -i.bak -E "s|version \"[0-9.]+\"|version \"${VERSION}\"|" Casks/mypet.rb
          sed -i.bak -E "s|sha256 \"[0-9a-f]+\"|sha256 \"${SHA}\"|" Casks/mypet.rb
          rm Casks/mypet.rb.bak

          # Also patch the version cell in the README table (best-effort).
          sed -i.bak -E "s|(\| mypet[^|]*\| [^|]*\| )[0-9.]+(\s*\|)|\1${VERSION}\2|" README.md || true
          rm -f README.md.bak

          if git diff --quiet; then
            echo "tap already up to date — nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/mypet.rb README.md
          git commit -m "feat: bump mypet to ${VERSION} — auto from mypet release workflow"
          git push origin HEAD:master
