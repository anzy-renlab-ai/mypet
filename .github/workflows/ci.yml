name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: swift test
    # macos-13 is being deprecated by GitHub Actions and was queueing for
    # 15+ minutes. macos-14 is the current stable runner and builds run
    # against macOS 13 SDK targets fine.
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
